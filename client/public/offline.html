<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlixCoach – Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #0a0a0f;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .icon { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
    p { color: #9ca3af; font-size: 15px; line-height: 1.6; max-width: 300px; }
    button {
      margin-top: 32px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #f97316, #a855f7);
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <img src="/icons/icon-192.png" class="icon" alt="FlixCoach" />
  <h1>Du bist offline</h1>
  <p>Bitte prüfe deine Internetverbindung und versuche es erneut.</p>
  <button onclick="location.reload()">Erneut versuchen</button>
</body>
</html>
